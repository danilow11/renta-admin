info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: '{{baseUrl}}/auth/login'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "daniel@example.com",
        "password": "password123"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("accessToken", res.body.accessToken);

settings:
  encodeUrl: true
